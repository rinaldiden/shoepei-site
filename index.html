<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shoepei</title>
<meta name="description" content="Shoepei — Democratize the freedom of walking. Open-source, 3D-printable shoes that return to the earth. Locally manifested. Part of Moving One Billion People." />
<meta name="theme-color" content="#0a0a0a" />
<meta property="og:title" content="Shoepei" />
<meta property="og:description" content="Democratize the freedom of walking. Open-source. 3D-printable. Locally manifested." />
<meta property="og:type" content="website" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, system-ui, "Helvetica Neue", Arial, sans-serif; background: #0a0a0a; color: #fafafa; overflow: hidden; }
body { display: grid; place-items: center; padding: 32px; }
.wrap { max-width: 760px; text-align: center; }
h1 { font-size: clamp(56px, 13vw, 132px); line-height: 1; font-weight: 700; letter-spacing: -0.045em; margin-bottom: 28px; }
.tag { font-size: clamp(18px, 2.4vw, 28px); line-height: 1.45; opacity: 0.72; margin-bottom: 52px; font-weight: 300; }
.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #f97316; margin: 0 12px 4px; vertical-align: middle; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
.status { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.5; font-weight: 500; }
.foot { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 12px; opacity: 0.3; letter-spacing: 0.08em; }
@media (prefers-reduced-motion: reduce) { .dot { animation: none; } }
</style>
</head>
<body>
<div class="wrap">
<h1>Shoepei</h1>
<p class="tag">Democratize the freedom of walking.<br/>Open-source. 3D-printable. Locally manifested.</p>
<p class="status"><span class="dot"></span>BUILDING</p>
</div>
<p class="foot">2026 — IN VALTELLINA</p>
</body>
</html>
